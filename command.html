<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コマンド一覧 - TSUNAMI SMP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>コマンド一覧</h1>
    <p>TSUNAMI SMPで使えるコマンド</p>
  </header>

  <nav>
    <a href="index.html">ホーム</a>
    <a href="commands.html">コマンド一覧</a>
  </nav>

  <main>
    <table>
      <tr>
        <th>コマンド</th>
        <th>説明</th>
      </tr>
      <tr>
        <td>/spawn</td>
        <td>スポーン地点に戻ります</td>
      </tr>
      <tr>
        <td>/sethome</td>
        <td>ホームを設定します</td>
      </tr>
      <tr>
        <td>/home</td>
        <td>設定したホームに移動します</td>
      </tr>
      <tr>
        <td>/tpa プレイヤー名</td>
        <td>相手にテレポート申請を送ります</td>
      </tr>
      <tr>
        <td>/bal</td>
        <td>所持金を確認します</td>
      </tr>
      <tr>
        <td>/pay プレイヤー名 金額</td>
        <td>相手にお金を送ります</td>
      </tr>
      <tr>
        <td>/ec</td>
        <td>エンダーチェストを開きます</td>
      </tr>
      <tr>
        <td>/rtp/td>
        <td>ランダムな場所にテレポートします</td>
      </tr>
    </table>
  </main>
</body>
</html>
